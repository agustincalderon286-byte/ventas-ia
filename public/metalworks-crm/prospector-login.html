<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chicago Metal Works Prospector Portal</title>
    <link rel="stylesheet" href="/metalworks-crm/styles.css" />
  </head>
  <body class="crm-login-page crm-prospector-login-page" data-crm-skin="prospector-premium">
    <main class="crm-login-shell">
      <section class="crm-login-card crm-login-card--prospector">
        <p class="crm-eyebrow">Field Team Portal</p>
        <h1>Chicago Metal Works &amp; Fencing</h1>
        <p class="crm-login-copy">
          Sign in to the field team portal to send photo-rich leads directly into
          the sales CRM.
        </p>

        <form class="crm-login-form" data-prospector-login-form>
          <label>
            <span>Your name</span>
            <input
              type="text"
              name="name"
              placeholder="Rigo Calderon"
              autocomplete="name"
              required
            />
          </label>

          <label>
            <span>Email</span>
            <input
              type="email"
              name="email"
              placeholder="team@chicagometalworksandfencing.com"
              autocomplete="username"
              required
            />
          </label>

          <label>
            <span>Team password</span>
            <input
              type="password"
              name="password"
              placeholder="Portal password"
              autocomplete="current-password"
              required
            />
          </label>

          <button type="submit" class="crm-primary-button">
            Sign in
          </button>
          <p class="crm-form-result" data-prospector-login-feedback></p>
        </form>
      </section>
    </main>

    <script src="/metalworks-crm/prospector-login.js"></script>
  </body>
</html>
