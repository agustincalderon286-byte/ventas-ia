<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chicago Metal Works Prospector Portal</title>
    <meta name="theme-color" content="#14263d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/metalworks-crm/prospector.webmanifest" />
    <link rel="icon" href="/metalworks-crm/prospector-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/metalworks-crm/styles.css" />
  </head>
  <body class="crm-login-page" data-crm-skin="executive-steel">
    <main class="crm-login-shell">
      <section class="crm-login-card crm-login-card--prospector">
        <p class="crm-eyebrow">Field Team Portal</p>
        <h1>Chicago Metal Works &amp; Fencing</h1>
        <p class="crm-login-copy">
          Sign in with your field account to send leads and project photos straight
          into the sales CRM.
        </p>

        <form class="crm-login-form" data-prospector-login-form>
          <label>
            <span>Account email</span>
            <input
              type="email"
              name="email"
              placeholder="field@chicagometalworksandfencing.com"
              autocomplete="username"
              required
            />
          </label>

          <label>
            <span>Password</span>
            <input
              type="password"
              name="password"
              placeholder="Your account password"
              autocomplete="current-password"
              required
            />
          </label>

          <button type="submit" class="crm-primary-button">
            Sign in
          </button>
          <p class="crm-form-result" data-prospector-login-feedback></p>
        </form>
      </section>
    </main>

    <script src="/metalworks-crm/prospector-login.js"></script>
  </body>
</html>
