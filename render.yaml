services:
  - type: web
    name: cmwf-crm-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/metalworks-crm/me
    autoDeploy: true
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: METALWORKS_ASSISTANT_MAX_MESSAGES_PER_DAY
        value: "20"
      - key: METALWORKS_CRM_PASSWORD
        sync: false
      - key: METALWORKS_CRM_ALLOWED_EMAILS
        value: agustincalderon423@gmail.com,agustincalderon286@gmail.com
